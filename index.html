<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FFmpeg GitHub Pages Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    button {
      padding: 10px 16px;
      font-size: 16px;
    }
    #log {
      margin-top: 15px;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h2>FFmpeg Video Generator (No SharedArrayBuffer)</h2>
  <button id="generate">Generate & Download Video</button>

  <div id="log"></div>

  <script type="module">
    import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js';
    import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
    };

    const ffmpeg = new FFmpeg();

    document.getElementById('generate').onclick = async () => {
      try {
        log('Loading FFmpeg...');
        await ffmpeg.load({
          coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js',
          wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.wasm'
        });

        log('Writing image...');
        await ffmpeg.writeFile(
          'image.png',
          await fetchFile('https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg')
        );

        log('Writing audio...');
        await ffmpeg.writeFile(
          'audio.mp3',
          await fetchFile('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')
        );

        log('Creating video...');
        await ffmpeg.exec([
          '-loop', '1',
          '-i', 'image.png',
          '-i', 'audio.mp3',
          '-c:v', 'libx264',
          '-t', '10',
          '-pix_fmt', 'yuv420p',
          '-shortest',
          'output.mp4'
        ]);

        log('Reading output...');
        const data = await ffmpeg.readFile('output.mp4');

        const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(videoBlob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'video.mp4';
        document.body.appendChild(a);
        a.click();

        URL.revokeObjectURL(url);
        a.remove();

        log('✅ Video downloaded successfully');
      } catch (err) {
        console.error(err);
        log('❌ ERROR: ' + err.message);
      }
    };
  </script>

</body>
</html>
