<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FFmpeg GitHub Pages – FINAL FIX</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 10px 16px; font-size: 16px; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h2>FFmpeg Video Generator (GitHub Pages Safe)</h2>
<button id="run">Generate & Download Video</button>
<pre id="log"></pre>

<script type="module">
  import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js';
  import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

  const log = msg => {
    document.getElementById('log').textContent += msg + '\n';
  };

  // 🔑 CREATE LOCAL WORKER VIA BLOB
  const workerSource = `
    importScripts("https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js");
  `;
  const workerBlob = new Blob([workerSource], { type: 'application/javascript' });
  const workerURL = URL.createObjectURL(workerBlob);

  const ffmpeg = new FFmpeg();

  document.getElementById('run').onclick = async () => {
    try {
      log('Loading FFmpeg...');

      await ffmpeg.load({
        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js',
        wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.wasm',
        workerURL // ✅ THIS FIXES GITHUB PAGES
      });

      log('Writing image...');
      await ffmpeg.writeFile(
        'image.png',
        await fetchFile('https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg')
      );

      log('Writing audio...');
      await ffmpeg.writeFile(
        'audio.mp3',
        await fetchFile('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')
      );

      log('Creating video...');
      await ffmpeg.exec([
        '-loop', '1',
        '-i', 'image.png',
        '-i', 'audio.mp3',
        '-t', '8',
        '-c:v', 'libx264',
        '-pix_fmt', 'yuv420p',
        '-shortest',
        'output.mp4'
      ]);

      log('Preparing download...');
      const data = await ffmpeg.readFile('output.mp4');

      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'video.mp4';
      a.click();

      URL.revokeObjectURL(url);
      log('✅ DONE! Video downloaded.');

    } catch (e) {
      console.error(e);
      log('❌ ERROR: ' + e.message);
    }
  };
</script>

</body>
</html>
