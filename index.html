// ===== VERSE COUNT PER SURAH (1-114) =====
const VERSE_COUNTS = [
  0, 7, 286, 200, 176, 120, 165, 206, 75, 129, 109, 123, 111, 43, 52, 99, 128, 111, 110, 98, 135, 112,
  78, 118, 64, 77, 227, 93, 88, 69, 60, 34, 30, 73, 54, 45, 83, 182, 88, 75, 85, 54, 53, 89, 59, 37,
  35, 38, 29, 18, 45, 60, 49, 62, 55, 78, 96, 29, 22, 24, 13, 14, 11, 11, 18, 12, 12, 30, 52, 52, 44,
  28, 28, 20, 56, 40, 31, 50, 40, 46, 42, 29, 19, 36, 25, 22, 17, 19, 26, 30, 20, 15, 21, 11, 8, 8, 19,
  5, 8, 8, 11, 11, 8, 3, 9, 5, 4, 7, 3, 6, 3, 5, 4, 5, 6
];

const UNSPLASH_KEY = 'JZLSF3RCJnC0k8odKHeLw3y_YW2VSaC7sjKU2OmesoI';

// Cache
let englishQuran = null;

// ===== LOAD ENGLISH QURAN (Mustafa Khattab) ON START =====
async function loadEnglishQuran() {
  if (englishQuran) return englishQuran;
  const resp = await fetch(
    'https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/eng-mustafakhattabg.min.json'
  );
  if (!resp.ok) throw new Error('Failed to load English translation');
  const data = await resp.json();
  englishQuran = data.quran || data;
  return englishQuran;
}

loadEnglishQuran().catch(() => {});

// ===== COMPUTE ABSOLUTE VERSE INDEX =====
function getAbsoluteVerseIndex(surah, verse) {
  let idx = 0;
  for (let s = 1; s < surah; s++) idx += VERSE_COUNTS[s];
  idx += verse - 1;
  return idx;
}

// ===== FETCH ARABIC + URDU FROM QURAN.COM API =====
async function fetchFromQuranAPI(surah, verse) {
  const key = `${surah}:${verse}`;
  const url = `https://api.quran.com/api/v4/verses/by_key/${key}?translations=97&fields=text_uthmani`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Verse not found');
  const data = await resp.json();
  const v = data.verse;
  const urduT = v.translations?.find(t => t.resource_id === 97);
  return {
    arabic: v.text_uthmani,
    urdu: urduT ? cleanTranslationText(urduT.text) : null,
    surahName: getSurahName(surah)
  };
}

function cleanTranslationText(text) {
  return text.replace(/<sup[^>]*>.*?<\/sup>/g, '').replace(/<[^>]+>/g, '').trim();
}

// ===== GET ENGLISH FROM CDN =====
async function getEnglishTranslation(surah, verse) {
  const quran = await loadEnglishQuran();
  const idx = getAbsoluteVerseIndex(surah, verse);
  if (idx >= 0 && idx < quran.length) return quran[idx].text;
  return null;
}

// ===== FALLBACK NATURE IMAGES =====

// ===== FETCH UNSPLASH NATURE IMAGE =====
async function fetchUnsplashImage() {
  const topics = ['nature', 'landscape', 'mountains', 'forest', 'ocean', 'sunset', 'sky', 'water'];
  const query = topics[Math.floor(Math.random() * topics.length)];
  const apiUrl = `https://api.unsplash.com/photos/random?query=${query}&orientation=landscape&client_id=${UNSPLASH_KEY}`;

  try {
    const resp = await fetch(apiUrl);
    if (resp.ok) {
      const text = await resp.text();
      if (text.startsWith('Rate Limit')) throw new Error('rate_limit');
      const data = JSON.parse(text);
      if (data.errors) throw new Error(data.errors.join(', '));
      return { url: data.urls?.regular || data.urls?.full, credit: data.user?.name };
    }
    throw new Error(`HTTP ${resp.status}`);
  } catch (err) {
    console.warn('Unsplash API fallback used:', err.message);
    return await fetchPixabayFallback();
  }
}

async function fetchPixabayFallback() {
  try {
    const resp = await fetch('https://pixabay.com/api/?key=25524219-f24f4c3d6e9d7f8a0b1c3d4e5&q=nature+landscape&image_type=photo&orientation=horizontal&per_page=20&safesearch=true');
    if (resp.ok) {
      const data = await resp.json();
      if (data.hits?.length) {
        const hit = data.hits[Math.floor(Math.random() * data.hits.length)];
        return { url: hit.largeImageURL || hit.webformatURL, credit: hit.user };
      }
    }
  } catch(e) { console.warn('Pixabay API:', e.message); }
  const all = [...FALLBACK_IMAGES.map(i => i.url), ...PIXABAY_IMAGES];
  const url = all[Math.floor(Math.random() * all.length)];
  return { url, credit: 'Nature' };
}

function cleanUnsplashUrl(url) {
  const uMatch = url.match(/photo-([a-zA-Z0-9_-]+)/);
  if (uMatch) return `https://images.unsplash.com/photo-${uMatch[1]}?w=1920`;
  return url;
}

// ===== RENDER TO CANVAS =====
async function renderCanvas(verses, surahName, surahNum, imageUrl) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const isMobile = window.innerWidth < 768;
  const W = isMobile ? 1080 : 1920;
  const mobileScale = W / 1920;
  const MARGIN_X = W * 0.13;
  const TEXT_W = W - MARGIN_X * 2;

  const bgImg = await loadImage(imageUrl);

  let sections = [];
  const GAP_BETWEEN_VERSES = 15;

  for (let vi = 0; vi < verses.length; vi++) {
    const v = verses[vi];
    const verseLabel = verses.length > 1 ? `— ${v.verseNum} —` : null;

    const arabicFontSize = fitText(ctx, v.arabic, TEXT_W * 0.92, Math.round(54 * mobileScale), Math.round(96 * mobileScale),
      `400 96px "Al Qalam Quran", "Amiri", "Noto Naskh Arabic", serif`);
    ctx.font = `400 ${arabicFontSize}px "Al Qalam Quran", "Amiri", "Noto Naskh Arabic", serif`;
    const arabicLines = wrapText(ctx, v.arabic, TEXT_W * 0.92);
    const arabicLineH = arabicFontSize * 1.85;
    const arabicH = arabicLines.length * arabicLineH;

    const engFontSize = fitText(ctx, v.english, TEXT_W, Math.round(32 * mobileScale), Math.round(48 * mobileScale),
      `400 48px "Playfair Display", "Cormorant Garamond", "Georgia", serif`);
    ctx.font = `400 ${engFontSize}px "Playfair Display", "Cormorant Garamond", "Georgia", serif`;
    const engLines = wrapText(ctx, v.english, TEXT_W);
    const engLineH = engFontSize * 1.7;
    const engH = engLines.length * engLineH;

    const urduFontSize = fitText(ctx, v.urdu, TEXT_W, Math.round(32 * mobileScale), Math.round(45 * mobileScale),
      `400 45px "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", serif`);
    ctx.font = `400 ${urduFontSize}px "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", serif`;
    const urduLines = wrapText(ctx, v.urdu, TEXT_W);
    const urduLineH = urduFontSize * 1.85;
    const urduH = urduLines.length * urduLineH;

    sections.push({
      verseLabel, arabicFontSize, arabicLines, arabicLineH, arabicH,
      engFontSize, engLines, engLineH, engH,
      urduFontSize, urduLines, urduLineH, urduH,
      verseNum: v.verseNum
    });
  }

  const headerH = Math.round(88 * mobileScale);
  const TOP_PAD = Math.round(224 * mobileScale);
  const BOTTOM_PAD = Math.round(144 * mobileScale);
  const GAP_HEADER = Math.round(96 * mobileScale);
  const GAP_AFTER_ARABIC = Math.round(48 * mobileScale);
  const GAP_AFTER_ENG = Math.round(35 * mobileScale);
  const GAP_AFTER_URDU = Math.round(35 * mobileScale);

  let contentH = headerH + GAP_HEADER;
  for (let i = 0; i < sections.length; i++) {
    const s = sections[i];
    if (i > 0) contentH += Math.round(64 * mobileScale);
    if (s.verseLabel) contentH += Math.round(64 * mobileScale);
    contentH += s.arabicH + GAP_AFTER_ARABIC + Math.round(28 * mobileScale) + GAP_AFTER_ARABIC + s.engH + GAP_AFTER_ENG + s.urduH;
  }

  const translatorH = Math.round(58 * mobileScale);
  contentH += Math.round(26 * mobileScale) + translatorH + Math.round(13 * mobileScale) + translatorH;

  const showRec = document.getElementById('showReciter').checked;
  let reciterCreditH = 0;
  if (showRec) {
    reciterCreditH = Math.round(40 * mobileScale);
    contentH += Math.round(16 * mobileScale) + reciterCreditH;
  }

  const footerH = Math.round(128 * mobileScale);
  const H = TOP_PAD + contentH + Math.round(64 * mobileScale) + footerH + BOTTOM_PAD;

  canvas.width = W;
  canvas.height = H;

  // ---- DRAW BACKGROUND ----
  const scale = Math.max(W / bgImg.width, H / bgImg.height);
  ctx.drawImage(bgImg, -(bgImg.width * scale - W) / 2, -(bgImg.height * scale - H) / 2, bgImg.width * scale, bgImg.height * scale);

  const overlay = ctx.createLinearGradient(0, 0, 0, H);
  overlay.addColorStop(0, 'rgba(0,0,0,0.40)');
  overlay.addColorStop(0.3, 'rgba(0,0,0,0.55)');
  overlay.addColorStop(0.6, 'rgba(0,0,0,0.68)');
  overlay.addColorStop(1, 'rgba(0,0,0,0.88)');
  ctx.fillStyle = overlay;
  ctx.fillRect(0, 0, W, H);

  const vignette = ctx.createRadialGradient(W / 2, H * 0.4, H * 0.35, W / 2, H * 0.4, H * 0.85);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.30)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // ---- TOP GOLD LINE ----
  const goldGrad = ctx.createLinearGradient(0, 0, W, 0);
  goldGrad.addColorStop(0, 'rgba(212,168,83,0)');
  goldGrad.addColorStop(0.2, 'rgba(212,168,83,0.25)');
  goldGrad.addColorStop(0.5, 'rgba(232,208,143,0.55)');
  goldGrad.addColorStop(0.8, 'rgba(212,168,83,0.25)');
  goldGrad.addColorStop(1, 'rgba(212,168,83,0)');
  ctx.fillStyle = goldGrad;
  ctx.fillRect(W * 0.18, Math.round(168 * mobileScale), W * 0.64, 1);

  let curY = TOP_PAD;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  // ---- HEADER ----
  const rangeLabel = verses.length === 1
    ? `${surahName}  ·  ${surahNum}:${verses[0].verseNum}`
    : `${surahName}  ·  ${surahNum}:${verses[0].verseNum}–${verses[verses.length-1].verseNum}`;
  ctx.direction = 'ltr';
  ctx.font = `400 ${Math.round(32 * mobileScale)}px "Playfair Display", "Cormorant Garamond", "Georgia", serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.fillText(rangeLabel, W / 2, curY);
  ctx.shadowBlur = 0;
  curY += headerH + GAP_HEADER;

  // ---- RENDER EACH VERSE ----
  for (let i = 0; i < sections.length; i++) {
    const s = sections[i];
    if (i > 0) curY += GAP_BETWEEN_VERSES;

    if (s.verseLabel) {
      ctx.direction = 'ltr';
      ctx.font = `400 ${Math.round(29 * mobileScale)}px "Cormorant Garamond", serif`;
      ctx.fillStyle = 'rgba(212,168,83,0.5)';
      ctx.fillText(s.verseLabel, W / 2, curY);
      curY += 64;
    }

    // Arabic
    ctx.direction = 'rtl';
    ctx.font = `400 ${s.arabicFontSize}px "Al Qalam Quran", "Amiri", "Noto Naskh Arabic", serif`;
    for (const line of s.arabicLines) {
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 12;
      ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = s.arabicFontSize * 0.08; ctx.lineJoin = 'round';
      ctx.strokeText(line, W / 2, curY);
      ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 4;
      ctx.fillStyle = '#ffffff'; ctx.fillText(line, W / 2, curY);
      ctx.restore();
      curY += s.arabicLineH;
    }

    curY += GAP_AFTER_ARABIC;
    drawOrnament(ctx, W / 2, curY, W * 0.12);
    curY += GAP_AFTER_ARABIC;

    // English
    ctx.direction = 'ltr';
    ctx.font = `400 ${s.engFontSize}px "Playfair Display", "Cormorant Garamond", "Georgia", serif`;
    for (const line of s.engLines) {
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8;
      ctx.fillStyle = 'rgba(255,253,245,0.92)'; ctx.fillText(line, W / 2, curY);
      ctx.restore();
      curY += s.engLineH;
    }
    curY += GAP_AFTER_ENG;

    // Urdu
    ctx.direction = 'rtl';
    ctx.font = `400 ${s.urduFontSize}px "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", serif`;
    for (const line of s.urduLines) {
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.75)'; ctx.shadowBlur = 10;
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = s.urduFontSize * 0.07; ctx.lineJoin = 'round';
      ctx.strokeText(line, W / 2, curY);
      ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 4;
      ctx.fillStyle = '#ffffff'; ctx.fillText(line, W / 2, curY);
      ctx.restore();
      curY += s.urduLineH;
    }
    curY += GAP_AFTER_URDU;
  }

  // ---- TRANSLATOR CREDITS ----
  curY += Math.round(26 * mobileScale);
  ctx.direction = 'ltr';
  ctx.font = `400 ${Math.round(24 * mobileScale)}px "Cormorant Garamond", serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 3;
  ctx.fillText('English: Dr. Mustafa Khattab, The Clear Quran', W / 2, curY);
  curY += translatorH;
  ctx.fillText('Urdu: Tafheem e Qur\'an — Syed Abu Ali Maududi', W / 2, curY);
  ctx.shadowBlur = 0;

  // ---- RECITER (only if checkbox checked) ----
  if (showRec) {
    curY += Math.round(40 * mobileScale) + reciterCreditH;
    ctx.font = `italic ${Math.round(26 * mobileScale)}px "Cormorant Garamond", serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 3;
    const reciterEl = document.getElementById('reciter');
    const recName = reciterEl ? reciterEl.options[reciterEl.selectedIndex]?.text : 'Mishary Alafasy';
    ctx.fillText('🎙 ' + (recName || 'Mishary Alafasy'), W / 2, curY);
    ctx.shadowBlur = 0;
  }

  // ---- BOTTOM GOLD LINE ----
  const footerY = H - footerH;
  const bottomGold = ctx.createLinearGradient(0, 0, W, 0);
  bottomGold.addColorStop(0, 'rgba(212,168,83,0)');
  bottomGold.addColorStop(0.3, 'rgba(212,168,83,0.2)');
  bottomGold.addColorStop(0.5, 'rgba(212,168,83,0.4)');
  bottomGold.addColorStop(0.7, 'rgba(212,168,83,0.2)');
  bottomGold.addColorStop(1, 'rgba(212,168,83,0)');
  ctx.fillStyle = bottomGold;
  ctx.fillRect(W * 0.22, footerY, W * 0.56, 1);
}

// ===== TEXT HELPERS =====
function fitText(ctx, text, maxWidth, minSize, maxSize, fontBase) {
  for (let size = maxSize; size >= minSize; size -= 2) {
    ctx.font = fontBase.replace(/\d+px/, `${size}px`);
    if (ctx.measureText(text).width <= maxWidth) return size;
  }
  return minSize;
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let currentLine = '';
  for (const word of words) {
    const testLine = currentLine ? `${currentLine} ${word}` : word;
    if (ctx.measureText(testLine).width > maxWidth && currentLine) {
      lines.push(currentLine);
      currentLine = word;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);
  return lines.length ? lines : [text];
}

function drawOrnament(ctx, x, y, width) {
  const half = width / 2;
  ctx.save();
  ctx.fillStyle = 'rgba(212,168,83,0.6)';
  ctx.shadowColor = 'rgba(212,168,83,0.4)';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(212,168,83,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - half, y);
  ctx.lineTo(x - 12, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 12, y);
  ctx.lineTo(x + half, y);
  ctx.stroke();
  ctx.fillStyle = 'rgba(212,168,83,0.7)';
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ===== IMAGE LOADER =====
function loadImage(url) {
  return new Promise(async (resolve, reject) => {
    try {
      const cleanUrl = cleanUnsplashUrl(url);
      const resp = await fetch(cleanUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const blob = await resp.blob();
      const blobUrl = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => { URL.revokeObjectURL(blobUrl); resolve(img); };
      img.onerror = () => { URL.revokeObjectURL(blobUrl); reject(new Error('Failed to decode image')); };
      img.src = blobUrl;
    } catch (err) { reject(err); }
  });
}

// ===== PARSE VERSE INPUT =====
function parseVerseInput(input, maxVerse) {
  const trimmed = input.trim();
  const rangeMatch = trimmed.match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if (rangeMatch) {
    const start = parseInt(rangeMatch[1]);
    const end = parseInt(rangeMatch[2]);
    if (start < 1 || end > maxVerse || start > end) return null;
    const verses = [];
    for (let v = start; v <= end; v++) verses.push(v);
    return verses;
  }
  const single = parseInt(trimmed);
  if (isNaN(single) || single < 1 || single > maxVerse) return null;
  return [single];
}

// ===== MAIN GENERATE FUNCTION =====
async function generate() {
  const surah = parseInt(document.getElementById('surah').value);
  const verseInput = document.getElementById('verse').value;

  if (isNaN(surah) || surah < 1 || surah > 114) {
    showError('Please enter a valid Surah number (1–114).');
    return;
  }

  const verseNums = parseVerseInput(verseInput, VERSE_COUNTS[surah]);
  if (!verseNums) {
    showError(`Invalid verse. Surah ${surah} has ${VERSE_COUNTS[surah]} verses. Use "1" or "1-5".`);
    return;
  }

  document.getElementById('result').classList.remove('visible');
  document.getElementById('error').classList.remove('visible');
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnDownloadVid').style.display = 'none';
  document.getElementById('videoPreview').classList.remove('visible');
  document.getElementById('recordingBar').classList.remove('visible');
  document.getElementById('vidCompat').classList.remove('visible');
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loaderText');
  loader.classList.add('visible');
  document.getElementById('btnGenerate').disabled = true;

  try {
    const surahName = getSurahName(surah);
    loaderText.textContent = `Fetching ${verseNums.length} verse(s) from Quran.com…`;

    const versePromises = verseNums.map(vn =>
      Promise.all([
        fetchFromQuranAPI(surah, vn),
        getEnglishTranslation(surah, vn)
      ]).then(([verseData, english]) => ({
        arabic: verseData.arabic,
        english: english,
        urdu: verseData.urdu,
        verseNum: vn
      }))
    );

    const [verses, imageData] = await Promise.all([
      Promise.all(versePromises),
      fetchUnsplashImage()
    ]);

    loaderText.textContent = 'Rendering beautiful image…';
    const reciterEl = document.getElementById('reciter');
    const reciterName = reciterEl.options[reciterEl.selectedIndex]?.text || 'Mishary Alafasy';
    await renderCanvas(verses, surahName, surah, imageData.url);

    document.getElementById('result').classList.add('visible');

    // Store verse data for video AND for cached re-render (reciter toggle)
    window._lastVerses = verses;
    window._lastSurah = surah;
    window._lastSurahName = surahName;
    window._lastImageUrl = imageData.url;
    window._lastReciterName = reciterName;
    // Cache for re-rendering without refetching
    window._lastRenderData = { verses, surahName, surahNum: surah, imageUrl: imageData.url };
  } catch (err) {
    console.error(err);
    showError(`Error: ${err.message}`);
  } finally {
    loader.classList.remove('visible');
    document.getElementById('btnGenerate').disabled = false;
  }
}

// Re-render from cache (used by reciter checkbox toggle — no API refetch)
async function rerenderImage() {
  const data = window._lastRenderData;
  if (!data) return;
  try {
    await renderCanvas(data.verses, data.surahName, data.surahNum, data.imageUrl);
  } catch (err) {
    console.error('Re-render failed:', err);
  }
}

// Hook checkbox to re-render from cache

// ===== DOWNLOAD IMAGE =====
function downloadImage() {
  const canvas = document.getElementById('canvas');
  const s = document.getElementById('surah').value;
  const v = document.getElementById('verse').value;
  try {
    canvas.toBlob((blob) => {
      if (!blob) {
        try {
          triggerDownload(canvas.toDataURL('image/png'), `quran-${s}-${v}.png`);
        } catch (e2) {
          showError('Download blocked. Right-click the image → Save As.');
        }
        return;
      }
      const url = URL.createObjectURL(blob);
      triggerDownload(url, `quran-${s}-${v.replace(/[–-]/g,'-')}.png`);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, 'image/png');
  } catch (err) {
    console.error('Download error:', err);
    showError('Download failed. Try right-clicking the image and "Save Image As".');
  }
}

function triggerDownload(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => { if (url.startsWith('blob:')) URL.revokeObjectURL(url); }, 2000);
}

// ===== AUDIO RECITATION URL =====
function getVerseAudioUrl(surah, verse, reciter) {
  const ss = String(surah).padStart(3, '0');
  const vv = String(verse).padStart(3, '0');
  return `https://everyayah.com/data/${reciter}/${ss}${vv}.mp3`;
}

// ===== CREATE VIDEO — silent recording (audio → stream only, NOT speakers) =====
let mediaRecorder = null;
let recordedChunks = [];
const VIDEO_CONVERTER_API = 'https://quran-verse-image-video-generator-production.up.railway.app/';

function getWhatsAppRecorderOptions() {
  const ua = navigator.userAgent;
  const isSafari = /^((?!chrome|android|crios|fxios|edg).)*safari/i.test(ua);
  const mp4Candidates = [
    'video/mp4;codecs="avc1.42E01E,mp4a.40.2"',
    'video/mp4;codecs="avc1.4D401E,mp4a.40.2"',
    'video/mp4;codecs="h264,aac"',
    'video/mp4'
  ];
  const webmCandidates = [
    'video/webm;codecs=vp8,opus',
    'video/webm;codecs=vp9,opus',
    'video/webm'
  ];

  if (!isSafari) {
    for (const mimeType of webmCandidates) {
      if (MediaRecorder.isTypeSupported(mimeType)) {
        return { mimeType, ext: 'webm', needsTranscode: true, videoBitsPerSecond: 6000000, audioBitsPerSecond: 128000 };
      }
    }
  }

  for (const mimeType of mp4Candidates) {
    if (MediaRecorder.isTypeSupported(mimeType)) {
      return { mimeType, ext: 'mp4', needsTranscode: false, videoBitsPerSecond: 6000000, audioBitsPerSecond: 128000 };
    }
  }

  for (const mimeType of webmCandidates) {
    if (MediaRecorder.isTypeSupported(mimeType)) {
      return { mimeType, ext: 'webm', needsTranscode: true, videoBitsPerSecond: 6000000, audioBitsPerSecond: 128000 };
    }
  }
  throw new Error('Video recording is not supported in this browser.');
}

async function convertToWhatsAppMp4(blob, statusEl) {
  const apiBase = VIDEO_CONVERTER_API.replace(/\/$/, '');
  if (!apiBase || apiBase.includes('YOUR-RAILWAY-APP')) {
    throw new Error('Set VIDEO_CONVERTER_API to your Railway backend URL before creating videos.');
  }
  if (!blob || blob.size < 1024) throw new Error('The browser recording was empty. Try again in Chrome or Edge.');
  if (statusEl) statusEl.textContent = 'Uploading video for MP4 conversion...';

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10 * 60 * 1000);
  try {
    const form = new FormData();
    const inputExt = blob.type.includes('mp4') ? 'mp4' : 'webm';
    form.append('video', blob, `recording.${inputExt}`);

    const response = await fetch(`${apiBase}/convert`, {
      method: 'POST',
      body: form,
      signal: controller.signal
    });

    if (statusEl) statusEl.textContent = 'Receiving MP4...';
    if (!response.ok) {
      let message = `Backend conversion failed (${response.status}).`;
      try { const details = await response.json(); if (details?.error) message = details.error; } catch(e) {}
      throw new Error(message);
    }

    const converted = await response.blob();
    if (!converted || converted.size < 1024) throw new Error('The backend returned an empty MP4.');
    return new Blob([converted], { type: 'video/mp4' });
  } catch (err) {
    if (err.name === 'AbortError') throw new Error('Backend conversion timed out. Try a shorter verse range or increase the server timeout.');
    throw err;
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchDecodedVerse(audioCtx, surah, verseNum, reciter) {
  const resp = await fetch(getVerseAudioUrl(surah, verseNum, reciter));
  if (!resp.ok) throw new Error(`Audio not found for verse ${verseNum}`);
  return audioCtx.decodeAudioData(await resp.arrayBuffer());
}

// Start audio buffer → ONLY to recording stream (NOT speakers), avoids double-play
function startAudioBuffer(audioCtx, destNode, buffer, options = {}) {
  const fadeSeconds = Math.min((options.fadeMs || 50) / 1000, Math.max(0, buffer.duration / 2 - 0.005));
  const startAt = Math.max(options.startAt || audioCtx.currentTime, audioCtx.currentTime);
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const shouldFadeIn = options.fadeIn !== false && fadeSeconds > 0;
  const shouldFadeOut = options.fadeOut !== false && fadeSeconds > 0;

  src.buffer = buffer;
  src.connect(gain);
  // ONLY connect to recording stream destination — NO speaker output during recording
  gain.connect(destNode);

  gain.gain.cancelScheduledValues(startAt);
  gain.gain.setValueAtTime(shouldFadeIn ? 0 : 1, startAt);
  if (shouldFadeIn) gain.gain.linearRampToValueAtTime(1, startAt + fadeSeconds);
  if (shouldFadeOut) {
    const fadeOutStart = Math.max(startAt, startAt + buffer.duration - fadeSeconds);
    gain.gain.setValueAtTime(1, fadeOutStart);
    gain.gain.linearRampToValueAtTime(0, startAt + buffer.duration);
  }

  const done = new Promise((resolve) => {
    src.onended = () => {
      try { src.disconnect(); gain.disconnect(); } catch(e) {}
      resolve();
    };
  });
  src.start(startAt);
  return { src, done, endAt: startAt + buffer.duration };
}

async function createVideo() {
  const btnVideo = document.getElementById('btnVideo');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    showError('Already recording.'); return;
  }

  const verses = window._lastVerses;
  const surah = window._lastSurah;
  if (!verses || !surah) { showError('Generate an image first.'); return; }

  const reciter = document.getElementById('reciter').value;
  btnVideo.disabled = true;
  recordedChunks = [];

  try {
    const recorderOptions = getWhatsAppRecorderOptions();
    btnVideo.textContent = '⏳ Loading first verse…';
    const audioCtx = new AudioContext();
    await audioCtx.resume();

    // Prefetch first verse audio
    let nextBufferPromise = fetchDecodedVerse(audioCtx, surah, verses[0].verseNum, reciter);

    // ---- Setup recording canvas ----
    const mainCanvas = document.getElementById('canvas');
    const W = mainCanvas.width;
    const H = mainCanvas.height;
    console.log('[Video] Canvas:', W, 'x', H);

    const rec = document.createElement('canvas');
    rec.width = W;
    rec.height = H;
    rec.style.cssText = 'position:absolute;left:-9999px;top:0';
    document.body.appendChild(rec);
    const rctx = rec.getContext('2d');
    rctx.drawImage(mainCanvas, 0, 0);

    // Draw reciter name on video canvas if enabled
    const reciterName = window._lastReciterName || 'Mishary Alafasy';
    if (document.getElementById('showReciter').checked) {
      rctx.font = 'italic 28px "Cormorant Garamond", serif';
      rctx.fillStyle = 'rgba(255,255,255,0.55)';
      rctx.shadowColor = 'rgba(0,0,0,0.6)'; rctx.shadowBlur = 4;
      rctx.textAlign = 'center';
      rctx.fillText('🎙 ' + reciterName, W / 2, H - 60);
      rctx.shadowBlur = 0;
      rctx.textAlign = 'start';
    }

    let stream;
    try {
      stream = rec.captureStream(30);
      if (!stream.getVideoTracks().length) throw new Error('No track');
      console.log('[Video] captureStream OK');
    } catch (e) {
      rec.remove();
      btnVideo.disabled = false; btnVideo.textContent = '🎬 Create Video';
      showError('Video capture failed. Use Chrome or Edge.');
      return;
    }

    // ---- Audio → stream only (no speakers) ----
    const destNode = audioCtx.createMediaStreamDestination();
    let combinedStream = stream;
    const at = destNode.stream.getAudioTracks()[0];
    if (at) {
      combinedStream = new MediaStream([stream.getVideoTracks()[0], at]);
      console.log('[Video] Audio track merged (silent recording)');
    }

    mediaRecorder = new MediaRecorder(combinedStream, {
      mimeType: recorderOptions.mimeType,
      videoBitsPerSecond: recorderOptions.videoBitsPerSecond,
      audioBitsPerSecond: recorderOptions.audioBitsPerSecond
    });
    console.log('[Video] Recorder:', recorderOptions.mimeType, recorderOptions.needsTranscode ? '→ converts to MP4/AAC' : '→ MP4/AAC');

    const recBar = document.getElementById('recordingBar');
    const recTimer = document.getElementById('recTimer');
    let recSeconds = 0;
    let timerInterval = null;

    mediaRecorder.ondataavailable = (e) => {
      if (e.data?.size > 0) { recordedChunks.push(e.data); console.log('[Video] Chunk:', (e.data.size/1024).toFixed(0), 'KB'); }
    };

    let cleanedUp = false;
    const cleanup = () => {
      if (cleanedUp) return;
      cleanedUp = true;
      if (window._activeAudioSources) {
        window._activeAudioSources.forEach(src => { try { src.stop(); } catch(e) {} });
        window._activeAudioSources = [];
      }
      clearInterval(window._drawTimer);
      rec.remove();
      audioCtx.close();
    };

    mediaRecorder.onstop = async () => {
      clearInterval(timerInterval); clearInterval(window._drawTimer);
      recBar.classList.remove('visible');
      window.removeEventListener('beforeunload', window._stopRecording);
      cleanup();
      console.log('[Video] Done. Chunks:', recordedChunks.length);
      if (!recordedChunks.length) {
        btnVideo.disabled = false; btnVideo.textContent = '🎬 Create Video';
        showError('No video data. Try a different browser.'); return;
      }

      const rawBlob = new Blob(recordedChunks, { type: recorderOptions.mimeType });
      console.log('[Video] Raw output:', (rawBlob.size/1024).toFixed(0), 'KB', recorderOptions.mimeType);
      const vLabel = verses.length === 1 ? String(verses[0].verseNum) : `${verses[0].verseNum}-${verses[verses.length-1].verseNum}`;

      // 1) SAVE RAW IMMEDIATELY — always works, no backend needed
      const rawUrl = URL.createObjectURL(rawBlob);
      window._lastVideoURL = rawUrl;
      window._lastVideoName = `quran-${surah}-${vLabel}.${recorderOptions.ext}`;
      window._lastVideoMime = recorderOptions.mimeType;
      document.getElementById('btnPlay').style.display = '';
      document.getElementById('btnDownloadVid').style.display = '';
      btnVideo.disabled = false; btnVideo.textContent = '🎬 Create Video';

      // 2) BACKGROUND: try Railway conversion to upgrade to MP4
      if (recorderOptions.needsTranscode) {
        btnVideo.textContent = 'Converting…';
        document.getElementById('vidCompat').classList.add('visible');
        try {
          const mp4Blob = await convertToWhatsAppMp4(rawBlob, document.getElementById('loaderText'));
          const mp4Url = URL.createObjectURL(mp4Blob);
          URL.revokeObjectURL(rawUrl);
          window._lastVideoURL = mp4Url;
          window._lastVideoName = `quran-${surah}-${vLabel}.mp4`;
          window._lastVideoMime = 'video/mp4';
          console.log('[Video] Upgraded to MP4:', (mp4Blob.size/1024).toFixed(0), 'KB');
          btnVideo.textContent = '🎬 Create Video';
        } catch (err) {
          console.warn('[Video] Railway unavailable, raw recording kept:', err.message);
          btnVideo.textContent = '🎬 Create Video';
          // Raw recording already saved above — user can download it
        } finally {
          document.getElementById('vidCompat').classList.remove('visible');
        }
      }
    };

    mediaRecorder.onerror = () => {
      clearInterval(timerInterval); clearInterval(window._drawTimer);
      recBar.classList.remove('visible');
      window.removeEventListener('beforeunload', window._stopRecording);
      cleanup();
      btnVideo.disabled = false; btnVideo.textContent = '🎬 Create Video';
    };

    // ---- Start recording — auto-stops when last verse finishes ----
    mediaRecorder.start(250);
    btnVideo.textContent = '🔴 Recording…';
    console.log('[Video] Started; recording until all verses finish');

    recBar.classList.add('visible');
    timerInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds / 60);
      const s = recSeconds % 60;
      recTimer.textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);

    window._stopRecording = () => {
      if (mediaRecorder.state === 'recording') {
        clearInterval(timerInterval); clearInterval(window._drawTimer);
        mediaRecorder.stop();
        recBar.classList.remove('visible');
        btnVideo.textContent = '💾 Saving…';
      }
    };
    window.addEventListener('beforeunload', window._stopRecording);

    // Keep feeding frames with animated sparkles
    const sparkles = Array.from({length: 40}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      s: Math.random() * 5 + 3, a: Math.random() * 0.25 + 0.1,
      da: (Math.random() - 0.5) * 0.05, dy: -(0.2 + Math.random() * 0.4),
      hue: Math.random() < 0.3 ? 45 : 0
    }));
    window._drawTimer = setInterval(() => {
      if (mediaRecorder.state !== 'recording') { clearInterval(window._drawTimer); return; }
      rctx.clearRect(0, 0, W, H);
      rctx.drawImage(mainCanvas, 0, 0);
      for (const sp of sparkles) {
        sp.a += sp.da;
        if (sp.a <= 0.15) sp.da = Math.abs(sp.da);
        if (sp.a >= 1) sp.da = -Math.abs(sp.da);
        sp.y += sp.dy;
        if (sp.y < -20 || sp.y > H + 20) { sp.y = H + 20; sp.x = Math.random() * W; sp.a = 0.2; }
        rctx.save();
        rctx.translate(sp.x, sp.y);
        const color = sp.hue ? `rgba(255,235,140,${sp.a.toFixed(2)})` : `rgba(255,255,255,${sp.a.toFixed(2)})`;
        rctx.fillStyle = color;
        rctx.beginPath();
        const o = sp.s * 0.35, i = sp.s;
        rctx.moveTo(0, -i); rctx.lineTo(o, -o); rctx.lineTo(i, 0); rctx.lineTo(o, o);
        rctx.lineTo(0, i); rctx.lineTo(-o, o); rctx.lineTo(-i, 0); rctx.lineTo(-o, -o);
        rctx.closePath(); rctx.fill();
        rctx.restore();
      }
    }, 100);

    // ---- Audio streaming: play verses sequentially into recording stream ----
    (async () => {
      try {
        const CROSSFADE_MS = 50;
        const activeSources = [];
        let previousPlayback = null;
        for (let i = 0; i < verses.length; i++) {
          btnVideo.textContent = `🔴 Recording ${i + 1}/${verses.length}…`;
          const currentBuffer = await nextBufferPromise;
          // Prefetch next verse while current one plays
          if (i + 1 < verses.length) {
            nextBufferPromise = fetchDecodedVerse(audioCtx, surah, verses[i + 1].verseNum, reciter).catch(err => {
              console.warn(`[Video] Verse ${verses[i+1].verseNum} audio skipped:`, err.message);
              return null; // Skip failed verse, continue with others
            });
          }
          const startAt = previousPlayback ? previousPlayback.endAt - (CROSSFADE_MS / 1000) : audioCtx.currentTime;
          const playback = startAudioBuffer(audioCtx, destNode, currentBuffer, {
            startAt, fadeMs: CROSSFADE_MS,
            fadeIn: i > 0, fadeOut: i < verses.length - 1
          });
          activeSources.push(playback.src);
          window._activeAudioSources = activeSources;
          if (previousPlayback) await previousPlayback.done;
          previousPlayback = playback;
          if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
        }
        if (previousPlayback) await previousPlayback.done;
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.requestData();
          mediaRecorder.stop();
          btnVideo.textContent = '💾 Saving…';
        }
      } catch (err) {
        console.error('[Video] Audio sequence failed:', err);
        if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        showError(`Video audio failed: ${err.message}`);
      }
    })();

  } catch (err) {
    console.error('[Video] Fatal:', err);
    btnVideo.disabled = false; btnVideo.textContent = '🎬 Create Video';
    showError(`Video: ${err.message}`);
  }
}

function stopRecording() {
  if (window._stopRecording) window._stopRecording();
}
